<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مجلس التمور العراقي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --amber:       #d97706;
            --amber-dark:  #b45309;
            --amber-glow:  rgba(217,119,6,.35);
            --stone-900:   #1c1917;
            --stone-800:   #292524;
            --stone-700:   #44403c;
            --stone-400:   #a8a29e;
            --danger:      #dc2626;
            --success:     #16a34a;
        }

        html, body { height: 100%; font-family: 'Cairo', sans-serif; overflow: hidden; }

        body {
            background: var(--stone-900);
            display: flex; align-items: center; justify-content: center;
        }

        /* ── Animated background ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 60% at 15% 15%,  rgba(217,119,6,.2)  0%, transparent 65%),
                radial-gradient(ellipse 60% 50% at 85% 85%,  rgba(180,83,9,.18)  0%, transparent 65%),
                radial-gradient(ellipse 80% 70% at 50% 50%,  rgba(28,25,23,1)    0%, transparent 100%);
        }

        .palms {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
        }
        .palm {
            position: absolute; bottom: 0; opacity: .06;
            font-size: 160px; line-height: 1; user-select: none;
            animation: palmSway ease-in-out infinite alternate;
        }
        .palm:nth-child(1) { right: 5%;  animation-duration: 7s; }
        .palm:nth-child(2) { left:  3%;  animation-duration: 9s;  animation-delay: -3s; font-size: 120px; }
        .palm:nth-child(3) { right: 30%; animation-duration: 11s; animation-delay: -6s; font-size: 90px; }

        @keyframes palmSway {
            from { transform: rotate(-4deg) scale(1); }
            to   { transform: rotate(4deg)  scale(1.05); }
        }

        .grain {
            position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ── Card ── */
        .page {
            position: relative; z-index: 10; padding: 1rem; width: 100%;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        .card {
            width: 100%; max-width: 430px;
            background: rgba(255,255,255,.045);
            border: 1px solid rgba(255,255,255,.09);
            border-radius: 28px;
            padding: 2.8rem 2.2rem 2.2rem;
            backdrop-filter: blur(28px);
            box-shadow:
                0 0 0 1px rgba(217,119,6,.18),
                0 40px 80px rgba(0,0,0,.55),
                inset 0 1px 0 rgba(255,255,255,.07);
            animation: cardIn .55s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1);   }
        }

        /* ── Logo ── */
        .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: .7rem; margin-bottom: 2.2rem; }

        .logo-badge {
            width: 70px; height: 70px; border-radius: 20px;
            background: linear-gradient(135deg, #f59e0b, var(--amber-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; box-shadow: 0 8px 28px var(--amber-glow);
            animation: badgePop .6s cubic-bezier(.34,1.56,.64,1) .2s both;
        }

        @keyframes badgePop {
            from { transform: scale(0) rotate(-15deg); opacity: 0; }
            to   { transform: scale(1) rotate(0);      opacity: 1; }
        }

        .logo-name {
            font-size: 1.2rem; font-weight: 800;
            background: linear-gradient(135deg, #fbbf24 20%, var(--amber-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-sub { font-size: .78rem; color: var(--stone-400); letter-spacing: .06em; }

        /* ── Alert ── */
        .alert {
            border-radius: 12px; font-size: .84rem; font-weight: 600;
            margin-bottom: 1.3rem; overflow: hidden; max-height: 0;
            transition: max-height .35s ease, padding .3s ease, opacity .3s ease;
            opacity: 0;
        }
        .alert.show { max-height: 80px; padding: .75rem 1rem; opacity: 1; display: flex; align-items: center; gap: .55rem; }
        .alert.error   { background: rgba(220,38,38,.13);  border: 1px solid rgba(220,38,38,.3);  color: #fca5a5; }
        .alert.warning { background: rgba(217,119,6,.13);  border: 1px solid rgba(217,119,6,.3);  color: #fcd34d; }
        .alert.success { background: rgba(22,163,74,.13);  border: 1px solid rgba(22,163,74,.3);  color: #86efac; }

        /* ── Fields ── */
        .form-group { margin-bottom: 1.1rem; }

        label {
            display: block; font-size: .8rem; font-weight: 700; letter-spacing: .05em;
            color: var(--stone-400); margin-bottom: .45rem; text-transform: uppercase;
        }

        .field-wrap { position: relative; }

        .field-icon {
            position: absolute; right: .95rem; top: 50%; transform: translateY(-50%);
            color: var(--stone-400); pointer-events: none; display: flex; transition: color .2s;
        }
        .field-wrap:focus-within .field-icon { color: var(--amber); }

        .field-wrap input {
            width: 100%; padding: .78rem 2.6rem .78rem .9rem;
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 13px; color: #fff;
            font-family: 'Cairo', sans-serif; font-size: .93rem;
            outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }
        .field-wrap input::placeholder { color: rgba(168,162,158,.5); }
        .field-wrap input:focus {
            border-color: var(--amber); background: rgba(217,119,6,.08);
            box-shadow: 0 0 0 3px rgba(217,119,6,.14);
        }
        .field-wrap input:disabled { opacity: .45; cursor: not-allowed; }

        .eye-btn {
            position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; padding: 0; cursor: pointer;
            color: var(--stone-400); display: flex; transition: color .2s;
        }
        .eye-btn:hover { color: var(--amber); }

        /* ── Attempt dots ── */
        .attempts-wrap { display: flex; gap: 5px; justify-content: center; margin: .8rem 0 0; }
        .att-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: rgba(255,255,255,.1); transition: background .3s, transform .25s;
        }
        .att-dot.used { background: var(--danger); transform: scale(1.2); }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%; padding: .88rem;
            background: linear-gradient(135deg, #f59e0b, var(--amber-dark));
            border: none; border-radius: 14px; color: #fff;
            font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 800;
            cursor: pointer; margin-top: 1.6rem;
            box-shadow: 0 4px 20px var(--amber-glow);
            transition: transform .15s, box-shadow .2s, opacity .2s;
            display: flex; align-items: center; justify-content: center; gap: .6rem;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px var(--amber-glow); }
        .btn-submit:active:not(:disabled) { transform: translateY(0); }
        .btn-submit:disabled { opacity: .45; cursor: not-allowed; }

        .spinner {
            width: 20px; height: 20px; display: none;
            border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff;
            border-radius: 50%; animation: spin .6s linear infinite;
        }
        .btn-submit.loading .btn-label { display: none; }
        .btn-submit.loading .spinner   { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Lockout strip ── */
        .lockout-strip {
            display: none; margin-top: 1.1rem;
            background: rgba(220,38,38,.1); border: 1px solid rgba(220,38,38,.22);
            border-radius: 12px; padding: .65rem 1rem;
            font-size: .82rem; color: #fca5a5; text-align: center; line-height: 1.6;
        }
        .lockout-strip.show { display: block; }
        .lockout-strip strong { color: #f87171; }

        .footer-link {
            display: block; text-align: center; margin-top: 1.8rem;
            color: var(--stone-400); font-size: .82rem; text-decoration: none; transition: color .2s;
        }
        .footer-link:hover { color: var(--amber); }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            18% { transform: translateX(-9px); }
            36% { transform: translateX(9px); }
            54% { transform: translateX(-5px); }
            72% { transform: translateX(5px); }
        }
        .shake { animation: shake .4s ease; }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="palms">
    <span class="palm">🌴</span>
    <span class="palm">🌴</span>
    <span class="palm">🌴</span>
</div>
<div class="grain"></div>

<div class="page">
<div class="card" id="card">

    <div class="logo-wrap">
        <div class="logo-badge">🌴</div>
        <div class="logo-name">مجلس التمور العراقي</div>
        <div class="logo-sub">لوحة التحكم الإدارية</div>
    </div>

    <div id="alertBox" class="alert" role="alert" aria-live="polite"></div>

    <form id="loginForm" novalidate autocomplete="off">

        <div class="form-group">
            <label for="emailInput">البريد الإلكتروني</label>
            <div class="field-wrap">
                <span class="field-icon">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                </span>
                <input type="email" id="emailInput" placeholder="admin@example.com"
                       autocomplete="username" inputmode="email" spellcheck="false">
            </div>
        </div>

        <div class="form-group">
            <label for="passwordInput">كلمة المرور</label>
            <div class="field-wrap">
                <span class="field-icon">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </span>
                <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="eye-btn" id="eyeBtn" tabindex="-1" aria-label="إظهار كلمة المرور">
                    <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="attempts-wrap" id="attemptsDots" style="display:none">
            <div class="att-dot" id="d1"></div>
            <div class="att-dot" id="d2"></div>
            <div class="att-dot" id="d3"></div>
            <div class="att-dot" id="d4"></div>
            <div class="att-dot" id="d5"></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            <span class="btn-label">دخول</span>
            <div class="spinner"></div>
        </button>

    </form>

    <div class="lockout-strip" id="lockoutStrip">
        🔒 تم تجميد الدخول بعد 5 محاولات فاشلة.<br>
        يُرفع الحظر خلال <strong id="lockoutSecs">300</strong> ثانية.
    </div>

    <a href="index.html" class="footer-link">← العودة إلى الموقع الرئيسي</a>

</div>
</div>

<script type="module">
import { initializeApp, getApps, getApp }
    from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

const FIREBASE_CONFIG = {
    apiKey:            'AIzaSyD2Y9jQF7XWmo0uegj3uWrQfTKbCAcH97o',
    authDomain:        'id-council-c1b1d.firebaseapp.com',
    projectId:         'id-council-c1b1d',
    storageBucket:     'id-council-c1b1d.firebasestorage.app',
    messagingSenderId: '2987746191',
    appId:             '1:2987746191:web:e8f267db34eb0a903b21fa'
};

const app  = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);

// ── DOM ──────────────────────────────────────────────────────────────────────
const form         = document.getElementById('loginForm');
const emailIn      = document.getElementById('emailInput');
const passIn       = document.getElementById('passwordInput');
const submitBtn    = document.getElementById('submitBtn');
const alertBox     = document.getElementById('alertBox');
const eyeBtn       = document.getElementById('eyeBtn');
const eyeIcon      = document.getElementById('eyeIcon');
const dotsWrap     = document.getElementById('attemptsDots');
const dots         = [1,2,3,4,5].map(i => document.getElementById('d'+i));
const lockoutStrip = document.getElementById('lockoutStrip');
const lockoutSecs  = document.getElementById('lockoutSecs');
const card         = document.getElementById('card');

// ── Brute-force protection ────────────────────────────────────────────────────
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 5 * 60 * 1000;
const K_ATT = '_la', K_LCK = '_lu';

const getAttempts  = ()  => parseInt(sessionStorage.getItem(K_ATT) || '0', 10);
const getLockoutTs = ()  => parseInt(sessionStorage.getItem(K_LCK) || '0', 10);
const saveAttempts = (n) => sessionStorage.setItem(K_ATT, n);
const saveLockout  = (t) => sessionStorage.setItem(K_LCK, t);
const clearBrute   = ()  => { sessionStorage.removeItem(K_ATT); sessionStorage.removeItem(K_LCK); };

function isLocked() {
    const until = getLockoutTs();
    if (!until) return false;
    if (Date.now() < until) return true;
    clearBrute();
    return false;
}

// ── Lockout ticker ────────────────────────────────────────────────────────────
let ticker = null;
function startTicker() {
    clearInterval(ticker);
    lockoutStrip.classList.add('show');
    setDisabled(true);
    ticker = setInterval(() => {
        const rem = Math.ceil((getLockoutTs() - Date.now()) / 1000);
        if (rem <= 0) {
            clearInterval(ticker);
            clearBrute();
            lockoutStrip.classList.remove('show');
            setDisabled(false);
            updateDots(0);
            showAlert('', '');
        } else {
            lockoutSecs.textContent = rem;
        }
    }, 1000);
    lockoutSecs.textContent = Math.ceil((getLockoutTs() - Date.now()) / 1000);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setDisabled(v) { emailIn.disabled = passIn.disabled = submitBtn.disabled = v; }

function showAlert(type, msg) {
    alertBox.className = 'alert' + (type ? ' ' + type + ' show' : '');
    alertBox.textContent = msg;
}

function updateDots(n) {
    if (n === 0) { dotsWrap.style.display = 'none'; return; }
    dotsWrap.style.display = 'flex';
    dots.forEach((d, i) => d.classList.toggle('used', i < n));
}

function shake() {
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
}

const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const EYE_SHUT = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

eyeBtn.addEventListener('click', () => {
    const show = passIn.type === 'password';
    passIn.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? EYE_SHUT : EYE_OPEN;
});

function errMsg(code) {
    const map = {
        'auth/invalid-email':          'البريد الإلكتروني غير صحيح.',
        'auth/user-not-found':         'البريد الإلكتروني أو كلمة المرور خاطئة.',
        'auth/wrong-password':         'البريد الإلكتروني أو كلمة المرور خاطئة.',
        'auth/invalid-credential':     'البريد الإلكتروني أو كلمة المرور خاطئة.',
        'auth/user-disabled':          'هذا الحساب معطّل. تواصل مع المسؤول.',
        'auth/too-many-requests':      'تم تجميد الحساب من Firebase بسبب محاولات كثيرة.',
        'auth/network-request-failed': 'لا يوجد اتصال بالإنترنت.',
    };
    return map[code] || 'حدث خطأ غير متوقع — حاول مرة أخرى.';
}

// ── Redirect helper ───────────────────────────────────────────────────────────
async function doRedirect(user) {
    try {
        const token = await user.getIdToken();
        sessionStorage.setItem('adminLoggedIn', 'true');
        sessionStorage.setItem('adminToken',    token);   // used by admin.html guard
        sessionStorage.setItem('adminUID',      user.uid);
        sessionStorage.setItem('adminEmail',    user.email || '');
    } catch (_) {}
    setTimeout(() => window.location.replace('admin.html'), 650);
}

// ── If already authenticated → skip login page ────────────────────────────────
onAuthStateChanged(auth, async (user) => {
    if (user) await doRedirect(user);
});

// ── Restore UI state from previous attempts in this session ───────────────────
if (isLocked()) {
    updateDots(MAX_ATTEMPTS);
    startTicker();
} else {
    const n = getAttempts();
    if (n > 0) updateDots(n);
}

// ── Form submit ───────────────────────────────────────────────────────────────
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isLocked()) { startTicker(); return; }

    const email = emailIn.value.trim();
    const pass  = passIn.value;

    if (!email || !pass) { showAlert('error', 'يرجى ملء جميع الحقول.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('error', 'صيغة البريد الإلكتروني غير صحيحة.'); return; }
    if (pass.length < 6) { showAlert('error', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل.'); return; }

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    showAlert('', '');

    try {
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        clearBrute();
        showAlert('success', '✅ تم تسجيل الدخول بنجاح! جاري التحويل…');
        await doRedirect(cred.user);

    } catch (err) {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;

        const n = getAttempts() + 1;
        saveAttempts(n);
        updateDots(n);
        shake();

        if (n >= MAX_ATTEMPTS) {
            saveLockout(Date.now() + LOCKOUT_MS);
            showAlert('warning', `تم تجميد الدخول لمدة 5 دقائق بعد ${MAX_ATTEMPTS} محاولات فاشلة.`);
            startTicker();
        } else {
            showAlert('error', `${errMsg(err.code)}  (${MAX_ATTEMPTS - n} محاولة متبقية)`);
        }
    }
});
</script>

</body>
</html>
